# ================ Enrollments ===============
mutation EnrollStudent($input: EnrollStudentInput!) {
  enrollStudent(input: $input) {
    id
    endedAt
    schoolId
    studentId
    startedAt
    createdAt
    updatedAt
    classroomId
  }
}

mutation CloseEnrollment($input: CloseEnrollmentInput!) {
  closeEnrollment(input: $input) {
    id
    endedAt
    schoolId
    studentId
    startedAt
    createdAt
    updatedAt
    classroomId
  }
}

query EnrollmentsByClassroom($schoolId: String!, $classroomId: String!) {
  enrollmentsByClassroom(schoolId: $schoolId, classroomId: $classroomId) {
    id
    endedAt
    schoolId
    studentId
    createdAt
    startedAt
    updatedAt
    classroomId
  }
}

# ================ Assessment Questions / Assignments ===============
query AssessmentQuestions {
  assessmentQuestions {
    id
    code
    text
    order
    isActive
    intelligenceKeys
  }
}

mutation CreateAssignment($input: CreateAssignmentInput!) {
  createAssignment(input: $input) {
    id
    title
    dueAt
    status
    schoolId
    updatedAt
    createdAt
    targetMode
    publishedAt
    createdById
    description
    targetGradeId
    targetClassroomId
  }
}

query Assignments($input: ListAssignmentsInput!) {
  assignments(input: $input) {
    skip
    take
    total
    items {
      id
      title
      dueAt
      status
      schoolId
      createdAt
      updatedAt
      targetMode
      description
      publishedAt
      createdById
      targetGradeId
      targetClassroomId
    }
  }
}

mutation PublishAssignment($id: String!) {
  publishAssignment(id: $id) {
    id
    status
    updatedAt
    publishedAt
  }
}

mutation AssignAssignmentToStudents($input: AssignAssignmentInput!) {
  assignAssignmentToStudents(input: $input)
}

# ================ Assessment Reports ===============
query AssessmentResults($input: ListAssessmentResultsInput!) {
  assessmentResults(input: $input) {
    take
    skip
    total
    items {
      id
      musical
      schoolId
      studentId
      createdAt
      linguistic
      logicalMath
      summaryJson
      dominantKey
      naturalistic
      visualSpatial
      interpersonal
      intrapersonal
      bodilyKinesthetic
      studentAssignmentId
      student {
        id
        email
        fullName
      }
      studentAssignment {
        id
        status
        startedAt
        studentId
        submittedAt
        evaluatedAt
        assignmentId
        completionRate
        assignment {
          id
          title
        }
      }
    }
  }
}

query SchoolAssessmentSummary($input: SchoolAssessmentSummaryInput) {
  schoolAssessmentSummary(input: $input) {
    avgMusical
    totalStudents
    avgLinguistic
    completionRate
    avgLogicalMath
    avgNaturalistic
    avgVisualSpatial
    totalAssignments
    avgInterpersonal
    avgIntrapersonal
    publishedAssignments
    avgBodilyKinesthetic
    pendingStudentAssignments
    submittedStudentAssignments
    evaluatedStudentAssignments
  }
}
