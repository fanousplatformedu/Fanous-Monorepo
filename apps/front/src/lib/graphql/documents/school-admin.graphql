mutation SchoolAdminLogin($input: AdminLoginInput!) {
  adminLogin(input: $input) {
    role
    userId
    message
    schoolId
    fullName
  }
}

query SchoolAdminMe {
  me {
    id
    role
    email
    schoolId
    username
    fullName
    avatarUrl
    forcePasswordChange
  }
}

mutation SchoolAdminChangePassword($input: ChangeAdminPasswordInput!) {
  changeAdminPassword(input: $input) {
    message
  }
}

query SchoolMembers($input: ListSchoolMembersInput!) {
  schoolMembers(input: $input) {
    total
    take
    skip
    items {
      id
      role
      email
      mobile
      status
      fullName
      createdAt
    }
  }
}

mutation RemoveSchoolMember($input: RemoveSchoolMemberInput!) {
  removeSchoolMember(input: $input) {
    id
    status
  }
}

query SchoolAdminAccessRequests($input: ListAccessRequestsInput!) {
  accessRequests(input: $input) {
    total
    take
    skip
    items {
      id
      email
      mobile
      status
      fullName
      createdAt
      reviewedAt
      rejectReason
      reviewedById
      requestedRole
      approvedUserId
    }
  }
}

mutation ReviewAccessRequest($input: ReviewAccessRequestInput!) {
  reviewAccessRequest(input: $input) {
    message
    requestId
    createdUserId
    notificationError
  }
}

query SchoolAdminAuditLogs($input: ListAuditLogsInput!) {
  auditLogs(input: $input) {
    total
    take
    skip
    items {
      id
      ip
      action
      actorId
      schoolId
      entityId
      metadata
      userAgent
      createdAt
      entityType
    }
  }
}

