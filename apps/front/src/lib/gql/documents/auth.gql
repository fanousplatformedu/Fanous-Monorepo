mutation SignInSuperAdmin($input: SignInSuperAdminInput!) {
  signInSuperAdmin(input: $input) {
    accessToken
    refreshToken
    expiresIn
    me {
      id
      globalRole
      email
    }
  }
}

mutation LogoutSuperAdmin($input: LogoutSuperAdminInput!) {
  logoutSuperAdmin(input: $input) {
    message
  }
}

mutation RequestLoginOtp($input: RequestLoginOtpInput!) {
  requestLoginOtp(input: $input) {
    message
    resendAfter
  }
}

mutation VerifyLoginOtp($input: VerifyLoginOtpInput!) {
  verifyLoginOtp(input: $input) {
    accessToken
    refreshToken
    expiresIn
    me {
      id
      schoolId
      globalRole
      schoolRole
      email
      phone
    }
  }
}

mutation Logout($input: LogoutInput!) {
  logout(input: $input) {
    message
  }
}

query Me {
  me {
    id
    globalRole
    email
    phone
    isActive
  }
}

mutation RefreshSuperAdminToken($input: RefreshSuperAdminInput!) {
  refreshSuperAdminToken(input: $input) {
    accessToken
    refreshToken
    expiresIn
  }
}

mutation RefreshToken($input: RefreshTokenInput!) {
  refreshToken(input: $input) {
    accessToken
    refreshToken
    expiresIn
  }
}
